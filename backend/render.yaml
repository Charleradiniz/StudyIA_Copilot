services:
  - type: web
    name: studyia-copilot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: RAG_MODE
        value: lite
      - key: CORS_ORIGINS
        sync: false
